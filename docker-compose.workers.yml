services:
  fping-worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fping_worker_1
    env_file:
      - .env
    environment:
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - WORKER_ID=worker-1
    volumes:
      - ./hosts-worker-1.txt:/app/hosts.txt:ro
      - ./worker.py:/app/worker.py:ro
    cap_add:
      - NET_RAW
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    restart: unless-stopped

